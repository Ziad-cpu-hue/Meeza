<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إنشاء حساب | ميزة</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-shell">

<div class="auth-header">
  <div class="container">
    <a href="index.html" class="brand">
      <img src="images/ChatGPT13.png" alt="ميزة" class="brand-logo-img">
    </a>
    <a href="index.html" class="btn btn-ghost">← العودة للرئيسية</a>
  </div>
</div>

<div class="auth-wrap">
  <div class="auth-card" style="max-width:560px;">
    <h1>إنشاء حساب جديد</h1>
    <p class="sub">انضم إلى ميزة اليوم</p>

    <div id="alertBox"></div>

    <div class="type-toggle">
      <button type="button" id="btnCustomer" class="active-customer">
        <span class="ic">👤</span> عميل
      </button>
      <button type="button" id="btnDriver">
        <span class="ic">🚗</span> كابتن
      </button>
    </div>

    <!-- ===================== نموذج العميل ===================== -->
    <form id="customerForm">
      <div class="field">
        <label>الاسم الكامل</label>
        <div class="input-wrap"><span class="ic">👤</span><input type="text" id="c_name" placeholder="أحمد محمد" required></div>
      </div>
      <div class="field">
        <label>رقم الهاتف</label>
        <div class="input-wrap"><span class="ic">📱</span><input type="tel" id="c_phone" placeholder="01012345678" pattern="01[0125][0-9]{8}" required></div>
      </div>
      <div class="field">
        <label>البريد الإلكتروني</label>
        <div class="input-wrap"><span class="ic">✉️</span><input type="email" id="c_email" placeholder="your@email.com" required></div>
      </div>
      <div class="field">
        <label>كلمة المرور</label>
        <div class="input-wrap"><span class="ic">🔒</span><input type="password" id="c_password" minlength="6" required></div>
      </div>
      <div class="field">
        <label>تأكيد كلمة المرور</label>
        <div class="input-wrap"><span class="ic">🔒</span><input type="password" id="c_password2" minlength="6" required></div>
      </div>
      <label class="check-row">
        <input type="checkbox" required>
        <span>أوافق على <a href="#">شروط الاستخدام</a> و<a href="#">سياسة الخصوصية</a></span>
      </label>
      <button type="submit" class="btn btn-primary btn-block btn-lg" id="customerSubmitBtn">إنشاء حساب</button>
    </form>

    <!-- ===================== نموذج الكابتن ===================== -->
    <form id="driverForm" class="hidden" enctype="multipart/form-data">
      <div class="alert alert-info">لازم ترفع صور واضحة عشان نراجع طلبك بسرعة. طلبك هيتراجع من فريق ميزة وهنبلغك بالنتيجة.</div>

      <label>نوع المركبة</label>
      <div class="vehicle-toggle" id="vehicleToggle" style="margin-top:.5rem;">
        <button type="button" data-vehicle="private_car" class="active">🚗 سيارة خاصة</button>
        <button type="button" data-vehicle="pickup_truck">🛻 سيارة نقل (بيك أب)</button>
        <button type="button" data-vehicle="refrigerated_truck">🧊 شاحنة مبردة</button>
      </div>
      <div class="vehicle-toggle">
        <button type="button" data-vehicle="motorcycle">🏍️ موتوسيكل توصيل</button>
      </div>
      <input type="hidden" id="d_vehicle_type" value="private_car">

      <div class="field">
        <label>الاسم الكامل</label>
        <div class="input-wrap"><span class="ic">👤</span><input type="text" id="d_name" placeholder="محمد علي" required></div>
      </div>
      <div class="field">
        <label>رقم الهاتف</label>
        <div class="input-wrap"><span class="ic">📱</span><input type="tel" id="d_phone" placeholder="01012345678" pattern="01[0125][0-9]{8}" required></div>
      </div>
      <div class="field">
        <label>البريد الإلكتروني</label>
        <div class="input-wrap"><span class="ic">✉️</span><input type="email" id="d_email" placeholder="your@email.com" required></div>
      </div>
      <div class="field">
        <label>كلمة المرور</label>
        <div class="input-wrap"><span class="ic">🔒</span><input type="password" id="d_password" minlength="6" required></div>
      </div>

      <div class="field file">
        <label id="vehiclePhotoLabel">صورة واضحة للمركبة</label>
        <input type="file" id="d_vehicle_photo" accept="image/*" required>
        <small>صورة واضحة تُظهر المركبة بالكامل</small>
      </div>
      <div class="field file">
        <label>صورة رخصة القيادة</label>
        <input type="file" id="d_license_photo" accept="image/*" required>
      </div>
      <div class="field file">
        <label>صورة شخصية ممسكاً البطاقة (وش البطاقة)</label>
        <input type="file" id="d_id_selfie_front" accept="image/*" required>
        <small>صورتك وأنت ماسك البطاقة الشخصية بجانب وشك، من ناحية الوش</small>
      </div>
      <div class="field file">
        <label>صورة ظهر البطاقة الشخصية</label>
        <input type="file" id="d_id_photo_back" accept="image/*" required>
      </div>

      <label class="check-row">
        <input type="checkbox" required>
        <span>أوافق على <a href="#">شروط الاستخدام</a> و<a href="#">سياسة الخصوصية</a> وأقر بصحة البيانات المُقدمة</span>
      </label>

      <button type="submit" class="btn btn-green btn-block btn-lg" id="driverSubmitBtn">إرسال طلب الانضمام</button>
    </form>

    <div class="sub" style="margin-top:1.5rem;">
      هل لديك حساب بالفعل؟ <a href="login.html" style="color:var(--primary);font-weight:700;">تسجيل الدخول</a>
    </div>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/register.js"></script>
</body>
</html>
