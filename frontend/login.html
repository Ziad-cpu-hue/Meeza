<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول | ميزة</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="auth-shell">

<div class="auth-header">
  <div class="container">
    <a href="index.html" class="brand">
      <img src="images/ChatGPT13.png" alt="ميزة" class="brand-logo-img">
    </a>
    <a href="index.html" class="btn btn-ghost">← العودة للرئيسية</a>
  </div>
</div>

<div class="auth-wrap">
  <div class="auth-card">
    <h1>تسجيل الدخول</h1>
    <p class="sub">أهلاً بعودتك إلى ميزة</p>

    <div id="alertBox"></div>

    <!-- Google Sign-In -->
    <div id="googleBtnContainer" style="display:flex;justify-content:center;margin-bottom:1rem;"></div>
    <button class="btn-google" id="googleFallbackBtn">
      <span>🔵</span> تسجيل الدخول بواسطة جوجل
    </button>

    <div class="divider">أو عن طريق البريد الإلكتروني</div>

    <form id="loginForm">
      <div class="field">
        <label for="email">البريد الإلكتروني</label>
        <div class="input-wrap">
          <span class="ic">✉️</span>
          <input id="email" type="email" placeholder="your@email.com" required>
        </div>
      </div>
      <div class="field">
        <label for="password">كلمة المرور</label>
        <div class="input-wrap">
          <span class="ic">🔒</span>
          <input id="password" type="password" placeholder="••••••••" required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg" id="submitBtn">تسجيل الدخول</button>
    </form>

    <div class="sub" style="margin-top:1.5rem;">
      ليس لديك حساب؟ <a href="register.html" style="color:var(--primary);font-weight:700;">إنشاء حساب جديد</a>
    </div>
    <div class="sub" style="margin-top:.5rem;font-size:.8rem;">
      هل أنت مسؤول المنصة؟ <a href="admin-login.html" style="color:var(--gray-600);font-weight:700;">دخول لوحة التحكم</a>
    </div>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
